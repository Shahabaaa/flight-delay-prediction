{% extends 'authority/homeindex.html' %}
{% block body %}
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <h2 class="text-center">Password</h2>
                <form method="post" action="/myapp/auth_changepassword_post/">
                    {% csrf_token %}
                    <div class="form-group">
                        <label for="username">current password</label>
                        <input type="text" class="form-control" name="current" id="username" placeholder="Enter your username" required>
                    </div>
                    <div class="form-group">
                        <label for="password">new password</label>
                        <input type="password" class="form-control" name="new" id="password" placeholder="Enter your password" required>
                    </div>
                    <div class="form-group">
                        <label for="password"> confirm password</label>
                        <input type="password" class="form-control"  name="confirm" id="password" placeholder="Enter your password" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">submit</button>
                </form>
                <div class="text-center mt-3">
                    <a href="#"></a>
                </div>
            </div>
        </div>
    </div>
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.1/jquery.min.js"></script>

{% endblock %}
