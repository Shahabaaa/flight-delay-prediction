<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EDIT AUTHORITY</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
 
</head>
<body>
  <div class="container">
    <h2 class="mb-4">EDIT AUTHORITY</h2>
    <form action="/myapp/editairportauthority_post/" method="post" enctype="multipart/form-data">
         {% csrf_token %}
    <input  type="hidden" value="{{ data.id }}" name="id">
      <div class="row mb-3">
        <label for="name" class="col-sm-4 ">Full Name</label>
        <div class="col-sm-8">
          <input type="text"value="{{data.Full_Name }}" class="form-control" name="Full_Name" id="name" required>
        </div>
      </div>

      <div class="row mb-3">
        <label class="col-sm-4 ">Gender</label>
        <div class="col-sm-8">
          <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" name="Gender" id="male" value="male" {% if data.Gender == 'male' %}checked{% endif %} required>
            <label class="form-check-label" for="male">Male</label>
          </div>
          <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" name="Gender" id="female" value="female" {% if data.Gender == 'female' %}checked{% endif %} required>
            <label class="form-check-label" for="female">Female</label>
          </div>
        </div>
      </div>

      <div class="row mb-3">
        <label for="dob" class="col-sm-4 ">Date of Birth</label>
        <div class="col-sm-8">
          <input type="date" value="{{ data.DOB | date:'Y-m-d' }}" class="form-control" name="DOB" id="dob" required>
        </div>
      </div>

      <div class="row mb-3">
        <label for="email" class="col-sm-4 ">Email address</label>
        <div class="col-sm-8">
          <input type="email" value="{{ data.Email }}" class="form-control" name="Email" id="email" required>
        </div>
      </div>

      <div class="row mb-3">
        <label for="phone" class="col-sm-4 ">Phone Number</label>
        <div class="col-sm-8">
          <input type="tel" pattern="[0-9]{10}" value="{{ data.Phone }}" class="form-control" name="Phone" id="phone" required>
        </div>
      </div>

      <div class="row mb-3">
        <label for="place" class="col-sm-4 ">Place</label>
        <div class="col-sm-8">
          <input type="text" value="{{ data.Place }}" class="form-control"name="Place" id="place" required>
        </div>
      </div>

      <div class="row mb-3">
        <label for="city" class="col-sm-4 ">City</label>
        <div class="col-sm-8">
          <input type="text"value="{{ data.City }}" class="form-control"name="City" id="City" required>
        </div>
      </div>

      <div class="row mb-3">
        <label for="state" class="col-sm-4 ">State</label>
        <div class="col-sm-8">
          <input type="text"value="{{ data.State }}" class="form-control"name="State"id="State" required>
        </div>
      </div>

         <div class="row mb-3">
        <label for="state" class="col-sm-4 ">District</label>
        <div class="col-sm-8">
          <input type="text"value="{{ data.District }}" class="form-control"name="District"id="district" required>
        </div>
      </div>

         <div class="row mb-3">
        <label for="state" class="col-sm-4 ">Post</label>
        <div class="col-sm-8">
          <input type="text"value="{{ data.Post }}" class="form-control"name="Post" id="post" required>
        </div>
      </div>

      <div class="row mb-3">
         <label for="pincode" class="col-sm-4 ">Pincode</label>
        <div class="col-sm-8">
          <input type="text" pattern="[0-9]{6}" value="{{ data.Pincode }}" class="form-control"name="Pincode" id="pincode" required>
        </div>
      </div>

      <div class="row mb-3">
        <label for="photo" class="col-sm-4 ">Upload Photo</label>
        <div class="col-sm-8">
            <img src="{{ data.Photo }}" width="100">
          <input type="file"value="{{ data.Photo }}" class="form-control"name="Photo" id="photo" accept="image/*" >
        </div>
      </div>
        <div class="row mb-3">
        <label for="photo" class="col-sm-4 ">Upload Proof</label>
        <div class="col-sm-8">
<img src="{{ data.Proof }}" width="100">
          <input type="file"value="{{ data.Proof }}" class="form-control"name="Photo" id="proof" accept="image/*" >
        </div>
      </div>



      <div class="row mb-3">
        <div class="offset-sm-4 col-sm-8">
          <button type="submit" class="btn btn-primary">Edit</button>
        </div>
      </div>
    </form>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
