{% extends 'Admin/home_index.html' %}
{% block body %}
  <div class="container">
    <h2 class="mb-4">ADD FLIGHT DETAILS </h2>



      {% for i in messages %}
  {{ i }}
  {% endfor %}
        <form method="post" action="/myapp/addflightdetails_post/" enctype="multipart/form-data">
            {% csrf_token %}
>
      <div class="row mb-3">
        <label for="Flight Name" class="col-sm-4 ">Flight Name</label>
        <div class="col-sm-8">
          <input type="text" class="form-control" id="name" name="FlightName" required>
        </div>
      </div>


      <div class="row mb-3">
        <label for="Source" class="col-sm-4 ">Source </label>
        <div class="col-sm-8">
          <input type="text" class="form-control" id="Source" name="Source" required>
        </div>
      </div>


      <div class="row mb-3">
        <label for="Destination" class="col-sm-4 ">Destination</label>
        <div class="col-sm-8">
          <input type="text" class="form-control" id="Destination" name="Destination" required>
        </div>
      </div>

      <div class="row mb-3">
        <label for="city" class="col-sm-4 ">Date</label>
        <div class="col-sm-8">
          <input type="date" class="form-control" id="Date" name="Date" required>
        </div>
      </div>

      <div class="row mb-3">
        <label for="Time" class="col-sm-4 ">Time</label>
        <div class="col-sm-8">
          <input type="time" class="form-control" id="state" name="Time"  required>
        </div>
      </div>





      <div class="row mb-3">
        <div class="offset-sm-4 col-sm-8">
          <button type="submit" class="btn btn-primary">Add</button>
        </div>
      </div>
    </form>
  </div>
{#  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>#}
{#</body>#}
{#</html>#}
{% endblock %}
