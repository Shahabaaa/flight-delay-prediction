{#<body>#}
{% extends 'Admin/home_index.html' %}
{% block body %}
  <div class="container">
    <h2 class="mb-4">ADD AIRLINE OPERATOR</h2>

            {% for i in messages %}
  {{ i }}
  {% endfor %}
    <form action="/myapp/addairlineoperator_post/" method="post" enctype="multipart/form-data" >
        {% csrf_token %}
      <div class="row mb-3">
        <label for="name" class="col-sm-4 ">Full Name</label>
        <div class="col-sm-8">
          <input type="text" class="form-control" name="name" id="name" required>
        </div>
      </div>

     <div class="row mb-3">
        <label class="col-sm-4 ">Gender</label>
        <div class="col-sm-8">
          <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" name="gender" id="male" value="male" required>
            <label class="form-check-label" for="male">Male</label>
          </div>
          <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" name="gender" id="female" value="female" required>
            <label class="form-check-label" for="female">Female</label>
          </div>
        </div>
      </div>

      <div class="row mb-3">
        <label for="email" class="col-sm-4 ">Email address</label>
        <div class="col-sm-8">
          <input type="email" class="form-control" name="email" id="email" required>
        </div>
      </div>
        <div class="row mb-3">
        <label for="dob" class="col-sm-4 ">dob</label>
        <div class="col-sm-8">
          <input type="date" class="form-control" name="dob" id="dob" required>
        </div>
      </div>

      <div class="row mb-3">
        <label for="phone" class="col-sm-4 ">Phone Number</label>
        <div class="col-sm-8">
          <input type="tel" pattern="[0-9]{10}" class="form-control" name="phone" id="phone" required>
        </div>
      </div>

      <div class="row mb-3">
        <label for="place" class="col-sm-4 ">Place</label>
        <div class="col-sm-8">
          <input type="text" class="form-control" name="place" id="place" required>
        </div>
      </div>

      <div class="row mb-3">
        <label for="city" class="col-sm-4 ">City</label>
        <div class="col-sm-8">
          <input type="text" class="form-control" name="city" id="city" required>
        </div>
      </div>
        <div class="row mb-3">
        <label for="District" class="col-sm-4 ">District</label>
        <div class="col-sm-8">
          <input type="text" class="form-control" name="district" id="district" required>
        </div>
      </div>

      <div class="row mb-3">
        <label for="state" class="col-sm-4 ">State</label>
        <div class="col-sm-8">
          <input type="text" class="form-control" name="state" id="state" required>
        </div>
      </div>
        <div class="row mb-3">
        <label for="Post" class="col-sm-4 ">Post</label>
        <div class="col-sm-8">
          <input type="text" class="form-control" name="post" id="post" required>
        </div>
      </div>

      <div class="row mb-3">
        <label for="pincode" class="col-sm-4 ">Pincode</label>
        <div class="col-sm-8">
          <input type="text" pattern="[0-9]{6}" class="form-control" name="pincode" id="pincode" required>
        </div>
      </div>

      <div class="row mb-3">
        <label for="photo" class="col-sm-4 ">Upload Photo</label>
        <div class="col-sm-8">
          <input type="file" class="form-control" name="photo" id="photo" accept="image/*" required>
        </div>
      </div>

         <div class="row mb-3">
        <label for="photo" class="col-sm-4 ">Upload proof</label>
        <div class="col-sm-8">
          <input type="file" class="form-control" name="proof" id="photo" accept="image/*" required>
        </div>
      </div>



      <div class="row mb-3">
        <div class="offset-sm-4 col-sm-8">
          <button type="submit" class="btn btn-primary">Add</button>
        </div>
      </div>
    </form>
  </div>
{#  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>#}
{#</body>#}
{#</html>#}

{% endblock %}
