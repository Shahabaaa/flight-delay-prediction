{#<body>#}
{% extends 'Admin/home_index.html' %}
{% block body %}
  <div class="container">
    <h2 class="mb-4">EDIT FLIGHT DETAILS </h2>
        <form method="post" action="/myapp/editflightdetails_post/" enctype="multipart/form-data">
            {% csrf_token %}
                <input  type="hidden" value="{{ data.id }}" name="id">

>
      <div class="row mb-3">
        <label for="Flight Name" class="col-sm-4 ">Flight Name</label>
        <div class="col-sm-8">
          <input type="text" class="form-control" id="name" value="{{ data.Flight_Name }}" name="FlightName" required>
        </div>
      </div>


      <div class="row mb-3">
        <label for="Source" class="col-sm-4 ">Source </label>
        <div class="col-sm-8">
          <input type="text" class="form-control" id="Source" value="{{data.Source}}" name="Source" required>
        </div>
      </div>


      <div class="row mb-3">
        <label for="Destination" class="col-sm-4 ">Destination</label>
        <div class="col-sm-8">
          <input type="text" class="form-control" id="Destination" value="{{ data.Destination }}" name="Destination" required>
        </div>
      </div>

      <div class="row mb-3">
        <label for="city" class="col-sm-4 ">Date</label>
        <div class="col-sm-8">
          <input type="date" class="form-control" id="Date" value="{{ data.Date|date:'Y-m-d' }}" name="Date" required>
        </div>
      </div>

      <div class="row mb-3">
        <label for="Time" class="col-sm-4 ">Time</label>
        <div class="col-sm-8">
          <input type="time" class="form-control" id="state" value="{{ data.Time|time:'H:i' }}" name="Time"  required>
        </div>
      </div>





      <div class="row mb-3">
        <div class="offset-sm-4 col-sm-8">
          <button type="submit" class="btn btn-primary">Edit</button>
        </div>
      </div>
    </form>
  </div>
{#  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>#}
{#</body>#}
{#</html>#}
{% endblock %}
